name: "Determine Tag"
description: "Determine the tag for SUNK images based on version tag, commit SHA, and any provided tag suffix."
inputs:
  tag-suffix:
    description: "Suffix to append to the tag."
    required: false
    default: ""
  version-tag:
    description: "Version tag to use (for releases). If not provided, uses commit SHA."
    required: false
    default: ""

outputs:
  tag:
    description: "The computed image tag."
    value: ${{ steps.determine-tag.outputs.tag }}

runs:
  using: "composite"
  steps:
    - name: Determine Tag or SHA
      id: determine-tag
      shell: bash
      env:
        LAST_COMMIT_SHA: ${{ github.sha }}
      run: |
        # Use version tag if provided, otherwise use short SHA
        if [ -n "${{ inputs.version-tag }}" ]; then
          _tag="${{ inputs.version-tag }}"
        else
          _tag=${LAST_COMMIT_SHA:0:8}
        fi

        # Append suffix if provided
        if [ -n "${{ inputs.tag-suffix }}" ]; then
          _tag="${_tag}-${{ inputs.tag-suffix }}";
        fi

        echo "::debug::tag: ${_tag}"
        echo "::debug::tag-suffix: ${{ inputs.tag-suffix}}"
        echo "::debug::version-tag: ${{ inputs.version-tag}}"

        echo "tag=${_tag}" >> $GITHUB_OUTPUT
